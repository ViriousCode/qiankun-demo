server {
    listen       80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # 核心：支持前端路由（React/Vue Router）
        try_files $uri $uri/ /index.html;
    }

   location /api {
        # 1. 物理链路：继续走 Docker 内网网关，保证网络畅通
        # 注意结尾没有 /，确保 /api 被完整传给后端
        # 转发到 Node serve 容器（docker-compose service 名）
        proxy_pass http://azura-framework-serve:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 3. 如果前端与 API 同域（都走 3000），其实不需要 CORS；保留也不影响
        add_header 'Access-Control-Allow-Origin' 'http://192.168.1.88:3000' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    # 可选：开启 Gzip 压缩
    gzip on;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript;
}

